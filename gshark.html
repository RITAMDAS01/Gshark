<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gshark | Neural Forensics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @keyframes fade-in { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .animate-in { animation: fade-in 0.3s ease-out forwards; }
        @keyframes spin-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .animate-spin-slow { animation: spin-slow 8s linear infinite; }
        body { background-color: #09090b; color: #a1a1aa; overflow: hidden; margin: 0; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
        ::-webkit-scrollbar-track { background: transparent; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const Icon = ({ name, size = 20, className = "" }) => {
          const icons = {
            shield: <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10" />,
            radar: <g><circle cx="12" cy="12" r="10" /><path d="M12 12L19 5" /><path d="M16 12a4 4 0 1 0-8 0 4 4 0 0 0 8 0" /></g>,
            network: <g><rect x="16" y="16" width="6" height="6" rx="1" /><rect x="2" y="16" width="6" height="6" rx="1" /><rect x="9" y="2" width="6" height="6" rx="1" /><path d="M5 16v-3a1 1 0 0 1 1-1h12a1 1 0 0 1 1 1v3" /><path d="M12 12V8" /></g>,
            terminal: <g><polyline points="4 17 10 11 4 5" /><line x1="12" y1="19" x2="20" y2="19" /></g>,
            brain: <g><path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96-.44 2.5 2.5 0 0 1-2.74-3.43 2.5 2.5 0 0 1-1.3-4.13 2.5 2.5 0 0 1 2-4.06 2.5 2.5 0 0 1 4.5-1.44z" /><path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96-.44 2.5 2.5 0 0 0 2.74-3.43 2.5 2.5 0 0 0 1.3-4.13 2.5 2.5 0 0 0-2-4.06 2.5 2.5 0 0 0-4.5-1.44z" /></g>,
            settings: <g><circle cx="12" cy="12" r="3" /><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z" /></g>,
            globe: <g><circle cx="12" cy="12" r="10" /><line x1="2" y1="12" x2="22" y2="12" /><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" /></g>,
            alert: <g><circle cx="12" cy="12" r="10" /><line x1="12" y1="8" x2="12" y2="12" /><line x1="12" y1="16" x2="12.01" y2="16" /></g>,
            upload: <g><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" /><polyline points="17 8 12 3 7 8" /><line x1="12" y1="3" x2="12" y2="15" /></g>,
            sparkle: <path d="M12 3l1.91 5.81L20 10.75l-5.09 1.94L12 18.5l-1.91-5.81L5 10.75l5.09-1.94z" />,
            toggleOn: <g stroke="none"><rect x="1" y="5" width="22" height="14" rx="7" fill="currentColor" fillOpacity="0.2" /><circle cx="16" cy="12" r="5" fill="currentColor" /></g>,
            toggleOff: <g stroke="none"><rect x="1" y="5" width="22" height="14" rx="7" fill="currentColor" fillOpacity="0.2" /><circle cx="8" cy="12" r="5" fill="currentColor" /></g>,
            search: <g><circle cx="11" cy="11" r="8" /><line x1="21" y1="21" x2="16.65" y2="16.65" /></g>,
            activity: <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />
          };
          return (
            <svg viewBox="0 0 24 24" width={size} height={size} fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
              {icons[name]}
            </svg>
          );
        };

        const App = () => {
          const [packets, setPackets] = React.useState([]);
          const [selectedPacket, setSelectedPacket] = React.useState(null);
          const [isAnalyzing, setIsAnalyzing] = React.useState(false);
          const [aiAnalysis, setAiAnalysis] = React.useState(null);
          const [status, setStatus] = React.useState("READY");
          const [view, setView] = React.useState('dashboard');
          const [englishQuery, setEnglishQuery] = React.useState("");
          const [activeFilter, setActiveFilter] = React.useState("");
          const [userApiKey, setUserApiKey] = React.useState(localStorage.getItem('gshark_vault_key') || "");
          const [isAiEnabled, setIsAiEnabled] = React.useState(true);

          const fileInputRef = React.useRef(null);

          const saveKey = (key) => {
            setUserApiKey(key);
            localStorage.setItem('gshark_vault_key', key);
          };

          const callGeminiAPI = async (promptText) => {
              const modelsToTry = [
                  'gemini-2.5-flash-preview-09-2025', 
                  'gemini-2.5-flash',                 
                  'gemini-1.5-flash'                  
              ];
              
              let lastError = null;

              for (const model of modelsToTry) {
                  try {
                      const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${userApiKey}`, {
                          method: 'POST',
                          headers: { 'Content-Type': 'application/json' },
                          body: JSON.stringify({
                              contents: [{ parts: [{ text: promptText }] }]
                          })
                      });
                      
                      if (!response.ok) {
                         const err = await response.json();
                         const errMsg = err.error?.message || "API Error";
                         
                         if (response.status === 404 || errMsg.toLowerCase().includes("not found")) {
                             console.warn(`[Gshark] Model ${model} rejected. Falling back to next available...`);
                             lastError = errMsg;
                             continue; 
                         }
                         throw new Error(errMsg);
                      }
                      
                      const data = await response.json();
                      return data.candidates?.[0]?.content?.parts?.[0]?.text || "";
                      
                  } catch (e) {
                      if (e.message.toLowerCase().includes("not found")) {
                          lastError = e.message;
                          continue;
                      }
                      throw e;
                  }
              }
              
              throw new Error(`All model endpoints exhausted. Last API Error: ${lastError}`);
          };

          const executeNeuralQuery = async () => {
            if (!englishQuery.trim()) { setActiveFilter(""); return; }
            if (!userApiKey) { 
                setStatus("KEY_REQUIRED"); 
                alert("ERROR: Please add your Gemini API key in the Configuration tab first.");
                return; 
            }
            
            setIsAnalyzing(true);
            setStatus("TRANSLATING_QUERY...");
            try {
              const prompt = `You are Gshark AI. Translate this network request into a single lowercase filter keyword (like 'tcp', 'udp', 'http', or an IP address). Request: "${englishQuery}". ONLY output the single keyword string.`;
              const filterString = await callGeminiAPI(prompt);
              
              const filter = filterString.trim().toLowerCase();
              
              setActiveFilter(filter);
              setStatus(`FILTER_SET: ${filter.toUpperCase()}`);
              if(view !== 'capture') setView('capture');
            } catch (e) { 
                setStatus("QUERY_ERROR"); 
                alert("AI Request Failed: " + e.message);
            }
            finally { setIsAnalyzing(false); }
          };

          const runDeepAnalysis = async () => {
              if (!selectedPacket) return;
              if (!userApiKey) {
                  setAiAnalysis({ raw: "CRITICAL FAILURE: No API Key provided in Configuration tab. Go to Configuration and enter your key." });
                  return;
              }
              setIsAnalyzing(true);
              setAiAnalysis(null);
              try {
                const prompt = `Analyze this raw packet capture frame. 
Protocol: ${selectedPacket.proto}
Source: ${selectedPacket.src}
Destination: ${selectedPacket.dst}
Size: ${selectedPacket.len} bytes
Hex Dump (first 80 bytes): ${selectedPacket.hex}

Act as a ruthless, expert network forensic analyst. Return ONLY a strict JSON object with this exact structure. No markdown formatting, no backticks, no extra text outside the JSON.
{
  "traffic_type": "Brief classification (e.g., SMBv3 Encrypted Payload, TCP SYN, etc.)",
  "risk_level": "SAFE", "LOW", "MEDIUM", "HIGH", or "CRITICAL",
  "anomalies": ["Anomaly 1", "Anomaly 2", "or 'No immediate threats detected'"],
  "payload_breakdown": "Technical breakdown of the hex dump. Be concise and technical.",
  "recommendation": "One brutal, actionable directive for the investigator."
}`;
                
                const result = await callGeminiAPI(prompt);
                
                // Defensive parsing to catch markdown artifacts
                const cleanedResult = result.replace(/```json/g, '').replace(/```/g, '').trim();
                
                try {
                    const parsedData = JSON.parse(cleanedResult);
                    setAiAnalysis(parsedData);
                } catch (parseError) {
                    // Fallback if AI hallucinates outside JSON format
                    console.warn("AI JSON parse failed, falling back to raw format.", parseError);
                    setAiAnalysis({ raw: result });
                }

              } catch (e) {
                setAiAnalysis({ raw: `CRITICAL FAILURE: ${e.message}` });
              }
              setIsAnalyzing(false);
          };

          const dissectPcap = (buffer) => {
            setPackets([]); 
            setSelectedPacket(null);
            setAiAnalysis(null);
            
            const viewData = new DataView(buffer);
            try {
              if (buffer.byteLength < 24) throw new Error("File too small");

              // Read the first 4 bytes exactly as they appear in the file (Big-Endian read)
              const magicRaw = viewData.getUint32(0, false);
              
              const isPcapNg = magicRaw === 0x0A0D0D0A;
              const isClassicLe = magicRaw === 0xD4C3B2A1 || magicRaw === 0x4D3CB2A1;
              const isClassicBe = magicRaw === 0xA1B2C3D4 || magicRaw === 0xA1B23C4D;

              if (!isPcapNg && !isClassicLe && !isClassicBe) {
                  setStatus(`ERR_INVALID_MAGIC: 0x${magicRaw.toString(16).toUpperCase().padStart(8, '0')}`);
                  return;
              }

              let frames = [];

              const parsePacket = (packetData, origLen) => {
                  let src = "Unknown", dst = "Unknown", proto = "RAW", risk = "safe";
                  let inclLen = packetData.length;

                  if (inclLen >= 34) { 
                    let ethOffset = 14;
                    let etherType = (packetData[12] << 8) | packetData[13];
                    
                    // Handle 802.1Q VLAN Tags
                    if (etherType === 0x8100) {
                       etherType = (packetData[16] << 8) | packetData[17];
                       ethOffset = 18;
                    }

                    if (etherType === 0x0800 && inclLen >= ethOffset + 20) { 
                      src = `${packetData[ethOffset+12]}.${packetData[ethOffset+13]}.${packetData[ethOffset+14]}.${packetData[ethOffset+15]}`;
                      dst = `${packetData[ethOffset+16]}.${packetData[ethOffset+17]}.${packetData[ethOffset+18]}.${packetData[ethOffset+19]}`;
                      const ipProto = packetData[ethOffset+9];
                      if (ipProto === 6) proto = 'TCP';
                      else if (ipProto === 17) proto = 'UDP';
                      else if (ipProto === 1) { proto = 'ICMP'; risk = 'medium'; }
                      else proto = `IPv4 (${ipProto})`;
                    } else if (etherType === 0x86DD && inclLen >= ethOffset + 40) { 
                      const getIp6 = (start) => {
                          let parts = [];
                          for(let i=0; i<8; i++) {
                              parts.push(((packetData[start + i*2] << 8) | packetData[start + i*2 + 1]).toString(16));
                          }
                          return parts.join(':').replace(/(^|:)0(:0)+(:|$)/g, '::').replace(/::+/g, '::');
                      };
                      src = getIp6(ethOffset + 8);
                      dst = getIp6(ethOffset + 24);
                      proto = 'IPv6';
                    } else if (etherType === 0x0806) {
                      proto = 'ARP';
                    } else {
                      proto = `ETH (0x${etherType.toString(16).padStart(4, '0')})`;
                    }
                  }

                  const hex = Array.from(packetData.slice(0, 100)).map(b => b.toString(16).padStart(2, '0')).join(' ');
                  frames.push({ id: frames.length + 1, src, dst, proto, len: origLen, risk, hex });
              };

              if (isPcapNg) {
                  const bomRaw = viewData.getUint32(8, false);
                  const isLE = bomRaw === 0x4D3C2B1A;
                  
                  let offset = 0;
                  while (offset < buffer.byteLength && frames.length < 3000) {
                      if (offset + 8 > buffer.byteLength) break;
                      const blockType = viewData.getUint32(offset, isLE);
                      const blockLen = viewData.getUint32(offset + 4, isLE);
                      
                      if (blockLen < 12 || offset + blockLen > buffer.byteLength) {
                          console.warn("Invalid PCAPNG block length at offset", offset);
                          break;
                      }
                      
                      if (blockType === 6) { // EPB
                          const capLen = viewData.getUint32(offset + 20, isLE);
                          const origLen = viewData.getUint32(offset + 24, isLE);
                          if (capLen > 0 && offset + 28 + capLen <= buffer.byteLength) {
                              const packetData = new Uint8Array(buffer.slice(offset + 28, offset + 28 + capLen));
                              parsePacket(packetData, origLen);
                          }
                      } else if (blockType === 3) { // SPB
                          const origLen = viewData.getUint32(offset + 12, isLE);
                          const capLen = Math.min(origLen, blockLen - 16);
                          if (capLen > 0 && offset + 16 + capLen <= buffer.byteLength) {
                              const packetData = new Uint8Array(buffer.slice(offset + 16, offset + 16 + capLen));
                              parsePacket(packetData, origLen);
                          }
                      }
                      
                      offset += blockLen;
                  }
              } 
              else {
                  const isLE = isClassicLe;
                  let offset = 24; // Skip the Global Header
                  
                  while (offset < buffer.byteLength && frames.length < 3000) {
                      if (offset + 16 > buffer.byteLength) break;
                      
                      const inclLen = viewData.getUint32(offset + 8, isLE);
                      const origLen = viewData.getUint32(offset + 12, isLE);
                      
                      if (inclLen === 0 || inclLen > 16777216 || offset + 16 + inclLen > buffer.byteLength) {
                          console.warn("Invalid classic PCAP packet length", inclLen, "at", offset);
                          break;
                      }

                      const packetData = new Uint8Array(buffer.slice(offset + 16, offset + 16 + inclLen));
                      parsePacket(packetData, origLen);
                      offset += 16 + inclLen;
                  }
              }
              
              if (frames.length === 0) { setStatus("ERR_NO_FRAMES_FOUND"); return; }
              setPackets(frames);
              setStatus(`LOADED_${frames.length}`);
            } catch (e) { 
              console.error("PCAP Parsing Error:", e);
              setStatus("ERR_CORRUPT_BUFFER"); 
            }
          };

          const topologyData = React.useMemo(() => {
            const nodesMap = {};
            const edgesMap = {};
            
            packets.forEach(p => {
              if (p.src !== "Unknown" && p.dst !== "Unknown") {
                  if (!nodesMap[p.src]) nodesMap[p.src] = { id: p.src, risk: p.risk, count: 0 };
                  if (!nodesMap[p.dst]) nodesMap[p.dst] = { id: p.dst, risk: p.risk, count: 0 };
                  nodesMap[p.src].count++;
                  nodesMap[p.dst].count++;
                  if (p.risk === 'medium') { nodesMap[p.src].risk = 'medium'; nodesMap[p.dst].risk = 'medium'; }

                  const edgeId = [p.src, p.dst].sort().join('-');
                  if(!edgesMap[edgeId]) edgesMap[edgeId] = { source: p.src, target: p.dst, weight: 0 };
                  edgesMap[edgeId].weight++;
              }
            });

            const nodes = Object.values(nodesMap);
            const edges = Object.values(edgesMap);
            
            nodes.forEach((n, i) => {
                n.x = 150 + (i % 4) * 200;
                n.y = 100 + Math.floor(i / 4) * 150;
            });

            return { nodes, edges };
          }, [packets]);

          const filteredPackets = React.useMemo(() => {
            if (!activeFilter) return packets;
            const f = activeFilter;
            return packets.filter(p => p.proto.toLowerCase().includes(f) || p.src.includes(f) || p.dst.includes(f));
          }, [packets, activeFilter]);

          const getProtoColor = (proto) => {
            const p = proto.toUpperCase();
            if (p === 'TCP') return 'text-cyan-400 bg-cyan-400/10 border border-cyan-400/20';
            if (p === 'UDP') return 'text-amber-400 bg-amber-400/10 border border-amber-400/20';
            if (p === 'HTTP' || p === 'HTTPS') return 'text-emerald-400 bg-emerald-400/10 border border-emerald-400/20';
            if (p === 'DNS') return 'text-purple-400 bg-purple-400/10 border border-purple-400/20';
            if (p === 'ICMP') return 'text-red-400 bg-red-400/10 border border-red-400/20';
            if (p === 'IPV6') return 'text-pink-400 bg-pink-400/10 border border-pink-400/20';
            return 'text-zinc-300 bg-zinc-800 border border-zinc-700';
          };

          const getRiskBadgeColor = (level) => {
              const l = (level || '').toUpperCase();
              if (l === 'CRITICAL') return 'bg-red-500/20 text-red-500 border-red-500/50';
              if (l === 'HIGH') return 'bg-orange-500/20 text-orange-500 border-orange-500/50';
              if (l === 'MEDIUM') return 'bg-amber-500/20 text-amber-500 border-amber-500/50';
              if (l === 'LOW') return 'bg-blue-500/20 text-blue-500 border-blue-500/50';
              return 'bg-emerald-500/20 text-emerald-500 border-emerald-500/50';
          };

          return (
            <div className="flex h-screen bg-zinc-950 text-zinc-400 font-sans overflow-hidden">
              <input type="file" ref={fileInputRef} className="hidden" onChange={(e) => {
                const file = e.target.files[0];
                if (file) {
                  const r = new FileReader();
                  r.onload = (ev) => dissectPcap(ev.target.result);
                  r.readAsArrayBuffer(file);
                }
              }} />

              <nav className="w-16 flex flex-col items-center py-6 gap-4 bg-zinc-950 border-r border-zinc-800/50 z-50">
                <div className="p-2 mb-4 bg-cyan-500/10 rounded-xl border border-cyan-500/20 shadow-[0_0_15px_rgba(6,182,212,0.15)]"><Icon name="shield" className="text-cyan-400" size={26} /></div>
                <div className="flex flex-col gap-3 w-full px-2">
                  <SideBtn iconName="radar" label="Dashboard" active={view === 'dashboard'} onClick={() => setView('dashboard')} />
                  <SideBtn iconName="network" label="Topology" active={view === 'topology'} onClick={() => setView('topology')} />
                  <SideBtn iconName="terminal" label="Capture Table" active={view === 'capture'} onClick={() => setView('capture')} />
                  <SideBtn iconName="brain" label="AI Forensics" active={view === 'analysis'} onClick={() => setView('analysis')} />
                </div>
                <div className="mt-auto w-full px-2">
                  <SideBtn iconName="settings" label="Configuration" active={view === 'settings'} onClick={() => setView('settings')} />
                </div>
              </nav>

              <main className="flex-1 flex flex-col min-w-0 bg-[#09090b]">
                <header className="h-16 flex items-center justify-between px-6 bg-zinc-950/80 border-b border-zinc-800/80 shrink-0 backdrop-blur-md">
                  <div className="flex items-center gap-4 w-1/4">
                    <h1 className="text-sm font-black tracking-widest text-zinc-200 uppercase">Gshark</h1>
                    <div className="h-4 w-[1px] bg-zinc-700" />
                    <div className="text-[10px] font-mono text-cyan-500 uppercase tracking-widest flex items-center gap-2">
                      <div className={`w-1.5 h-1.5 rounded-full ${status.includes('ERR') ? 'bg-red-500' : 'bg-cyan-500'} animate-pulse`}></div>
                      <span className={status.includes('ERR') ? 'text-red-500 font-bold' : ''}>{status}</span>
                    </div>
                  </div>
                  
                  <div className="flex-1 max-w-xl mx-4 flex items-center">
                    <div className="relative w-full group shadow-[0_0_20px_rgba(6,182,212,0.03)] rounded-md">
                      <div className="absolute left-3 top-1/2 -translate-y-1/2 text-cyan-500 transition-colors">
                        {isAnalyzing ? <Icon name="sparkle" size={14} className="animate-spin-slow" /> : <Icon name="search" size={14} />}
                      </div>
                      <input 
                        type="text" 
                        value={englishQuery}
                        onChange={e => setEnglishQuery(e.target.value)}
                        onKeyDown={e => e.key === 'Enter' && executeNeuralQuery()}
                        placeholder="Neural Query: e.g. 'Show me only DNS traffic from my local network'..."
                        className="w-full bg-zinc-900 border border-zinc-700 rounded-md py-2.5 pl-9 pr-24 text-[11px] text-zinc-100 focus:outline-none focus:border-cyan-500/50 focus:ring-1 focus:ring-cyan-500/50 transition-all font-mono placeholder:text-zinc-600"
                        disabled={!isAiEnabled}
                      />
                      <button 
                        onClick={executeNeuralQuery}
                        disabled={isAnalyzing || !englishQuery.trim() || !isAiEnabled}
                        className="absolute right-1.5 top-1/2 -translate-y-1/2 px-4 py-1.5 bg-cyan-600 hover:bg-cyan-500 text-white rounded text-[9px] font-bold uppercase tracking-widest transition-all disabled:opacity-50 disabled:bg-zinc-800 disabled:text-zinc-500"
                      >
                        Execute
                      </button>
                    </div>
                  </div>

                  <div className="flex justify-end gap-3 w-1/4">
                    <button onClick={() => fileInputRef.current.click()} className="flex items-center gap-2 text-[10px] font-bold border border-zinc-700 bg-zinc-800 hover:bg-zinc-700 hover:border-zinc-500 px-4 py-2 rounded-md text-zinc-200 uppercase transition-all tracking-widest">
                      <Icon name="upload" size={14} className="text-cyan-400" /> Ingest
                    </button>
                  </div>
                </header>

                <div className="flex-1 overflow-hidden relative">
                  {/* DASHBOARD */}
                  {view === 'dashboard' && (
                    <div className="p-8 h-full overflow-auto space-y-8 animate-in">
                      <div className="flex justify-between items-end border-b border-zinc-800/50 pb-6">
                         <h1 className="text-2xl font-black text-zinc-100 uppercase tracking-widest">Operations Control</h1>
                         <div className="text-[10px] font-mono text-zinc-500">UID: <span className="text-zinc-400 font-bold">GSHARK-0xFD-STABLE</span></div>
                      </div>
                      
                      <div className="grid grid-cols-4 gap-6">
                        <StatBox label="Ingested Buffer" val={packets.length} iconName="activity" color="cyan" />
                        <StatBox label="Unique Endpoints" val={topologyData.nodes.length} iconName="globe" color="blue" />
                        <StatBox label="Alert Flags" val={packets.filter(p=>p.risk==='medium').length} iconName="alert" color="red" />
                        <StatBox label="Neural Link" val={isAiEnabled && userApiKey ? "LINKED" : "OFFLINE"} iconName="brain" color={isAiEnabled && userApiKey ? "emerald" : "zinc"} />
                      </div>

                      <div className={`bg-zinc-900/40 border border-zinc-800/50 rounded-xl p-24 text-center border-dashed transition-all ${packets.length > 0 ? 'border-emerald-500/30 shadow-[0_0_30px_rgba(16,185,129,0.05)]' : 'hover:border-cyan-500/30'}`}>
                         <Icon name="radar" className={`mx-auto mb-4 animate-spin-slow ${packets.length > 0 ? 'text-emerald-500/40' : 'text-cyan-500/40 group-hover:text-cyan-400'}`} size={56} />
                         <p className="text-[11px] text-zinc-400 font-mono tracking-widest">
                           {packets.length > 0 ? `[ ACTIVE TELEMETRY LOG: ${packets.length} FRAMES BUFFERED ]` : `[ AWAITING CLASSIC PCAP TELEMETRY ]`}
                         </p>
                      </div>
                    </div>
                  )}

                  {/* TOPOLOGY */}
                  {view === 'topology' && (
                    <div className="h-full p-8 flex flex-col animate-in">
                       <h2 className="text-sm font-bold text-zinc-200 uppercase mb-6 tracking-widest">Neural Relation Map</h2>
                       <div className="flex-1 bg-zinc-950 border border-zinc-800/50 rounded-xl relative overflow-auto flex items-center justify-center p-8 shadow-inner min-h-[500px]">
                          <div className="absolute inset-0 opacity-10 pointer-events-none" style={{backgroundImage: 'radial-gradient(#06b6d4 1px, transparent 0)', backgroundSize: '30px 30px'}} />
                          {topologyData.nodes.length === 0 ? (
                              <div className="text-xs font-mono text-zinc-600 tracking-widest border border-zinc-800 bg-zinc-900/50 px-6 py-3 rounded-md">NO TOPOLOGY DATA</div>
                          ) : (
                              <svg width="100%" height="100%" style={{minWidth: '800px', minHeight: '600px'}}>
                                 {/* Draw Edges First */}
                                 {topologyData.edges.map((e, i) => {
                                     const sourceNode = topologyData.nodes.find(n => n.id === e.source);
                                     const targetNode = topologyData.nodes.find(n => n.id === e.target);
                                     if(!sourceNode || !targetNode) return null;
                                     const isRisk = sourceNode.risk === 'medium' || targetNode.risk === 'medium';
                                     return (
                                        <line 
                                           key={`edge-${i}`} 
                                           x1={sourceNode.x} y1={sourceNode.y} 
                                           x2={targetNode.x} y2={targetNode.y} 
                                           stroke={isRisk ? 'rgba(239, 68, 68, 0.4)' : 'rgba(63, 63, 70, 0.8)'} 
                                           strokeWidth={Math.min(Math.max(e.weight * 0.5, 1), 6)} 
                                        />
                                     );
                                 })}
                                 {/* Draw Nodes */}
                                 {topologyData.nodes.map((n, i) => {
                                    const isRisk = n.risk === 'medium';
                                    const radius = Math.min(20 + (n.count * 0.5), 35);
                                    return (
                                      <g key={i}>
                                        <circle cx={n.x} cy={n.y} r={radius} fill="#09090b" stroke={isRisk?'#ef4444':'#06b6d4'} strokeWidth="2" className="transition-all hover:fill-cyan-900/50 cursor-pointer" />
                                        <text x={n.x} y={n.y + radius + 15} fill={isRisk?'#fca5a5':'#a1a1aa'} fontSize="10" textAnchor="middle" fontWeight="bold" className="font-mono">{n.id}</text>
                                        <circle cx={n.x} cy={n.y} r="4" fill={isRisk?'#ef4444':'#06b6d4'} className={isRisk ? "animate-pulse" : ""} />
                                      </g>
                                    );
                                 })}
                              </svg>
                          )}
                       </div>
                    </div>
                  )}

                  {/* CAPTURE */}
                  {view === 'capture' && (
                    <div className="h-full flex flex-col font-mono text-[10px] animate-in">
                       {activeFilter && (
                         <div className="px-6 py-3 bg-cyan-950/20 border-b border-cyan-900/30 text-[9px] flex items-center gap-4">
                           <span className="uppercase text-cyan-400 font-bold tracking-widest">Active Filter:</span>
                           <span className="text-white bg-cyan-600 px-3 py-1 rounded shadow-sm">{activeFilter.toUpperCase()}</span>
                           <button onClick={() => {setActiveFilter(""); setEnglishQuery("");}} className="text-zinc-400 hover:text-white underline ml-auto">CLEAR FILTER</button>
                         </div>
                       )}
                       <div className="flex-1 overflow-auto">
                         <table className="w-full text-left border-collapse">
                            <thead className="bg-zinc-950 sticky top-0 border-b border-zinc-800 text-zinc-400 z-10 shadow-md">
                               <tr>
                                  <th className="px-6 py-4 uppercase font-bold tracking-widest w-24">UID</th>
                                  <th className="px-4 py-4 uppercase font-bold tracking-widest w-24">Proto</th>
                                  <th className="px-4 py-4 uppercase font-bold tracking-widest">Source Addr</th>
                                  <th className="px-4 py-4 uppercase font-bold tracking-widest">Dest Addr</th>
                                  <th className="px-4 py-4 uppercase font-bold tracking-widest text-right">Bytes</th>
                               </tr>
                            </thead>
                            <tbody className="divide-y divide-zinc-800/50">
                               {filteredPackets.map(p => (
                                 <tr key={p.id} onClick={() => setSelectedPacket(p)} className={`hover:bg-zinc-800/50 cursor-pointer transition-all ${selectedPacket?.id === p.id ? 'bg-cyan-900/20 border-l-2 border-cyan-500' : ''}`}>
                                    <td className="px-6 py-3.5 text-zinc-500 font-bold">#{p.id.toString().padStart(4, '0')}</td>
                                    <td className="px-4 py-3.5"><span className={`px-2 py-0.5 rounded text-[9px] font-bold ${getProtoColor(p.proto)}`}>{p.proto}</span></td>
                                    <td className="px-4 py-3.5 text-zinc-300">{p.src}</td>
                                    <td className="px-4 py-3.5 text-zinc-300">{p.dst}</td>
                                    <td className="px-4 py-3.5 text-zinc-500 text-right">{p.len}</td>
                                 </tr>
                               ))}
                            </tbody>
                         </table>
                         {filteredPackets.length === 0 && (
                            <div className="text-center py-20 text-zinc-600 font-mono tracking-widest">NO DATA IN BUFFER</div>
                         )}
                       </div>
                       {selectedPacket && (
                         <div className="h-56 border-t border-zinc-800 bg-zinc-950 p-6 flex flex-col shadow-[0_-10px_30px_rgba(0,0,0,0.5)] z-20 relative">
                            <div className="flex justify-between items-center mb-3">
                                <h4 className="text-[9px] font-bold text-cyan-500 uppercase tracking-[0.2em] flex items-center gap-2">
                                  <Icon name="terminal" size={12} /> Frame Buffer Dump
                                </h4>
                                <button onClick={() => {setView('analysis'); runDeepAnalysis();}} className="text-[9px] bg-cyan-600 hover:bg-cyan-500 text-white px-3 py-1.5 rounded font-bold tracking-widest uppercase transition-colors">
                                    Send to Neural Analysis
                                </button>
                            </div>
                            <div className="flex-1 text-zinc-300 break-all text-[11px] leading-relaxed font-mono select-all bg-black p-4 rounded-md border border-zinc-800/80 overflow-y-auto">
                              {selectedPacket.hex}
                            </div>
                         </div>
                       )}
                    </div>
                  )}

                  {/* ANALYSIS */}
                  {view === 'analysis' && (
                    <div className="p-8 max-w-4xl mx-auto space-y-8 animate-in h-full flex flex-col">
                       <div className="flex justify-between items-end">
                           <h2 className="text-2xl font-black text-zinc-100 uppercase tracking-widest flex items-center gap-3">
                             <Icon name="brain" size={24} className="text-cyan-500" /> Deep Heuristic Audit
                           </h2>
                           {selectedPacket && (
                               <button 
                                  onClick={runDeepAnalysis}
                                  disabled={isAnalyzing}
                                  className="text-[10px] border border-cyan-500 text-cyan-500 hover:bg-cyan-500 hover:text-black px-4 py-2 rounded font-bold uppercase tracking-widest transition-colors disabled:opacity-50"
                               >
                                  {isAnalyzing ? "Processing..." : `Audit Frame #${selectedPacket.id}`}
                               </button>
                           )}
                       </div>

                       {selectedPacket ? (
                           <div className="text-[11px] font-mono bg-zinc-900 border border-zinc-700/50 rounded px-4 py-3 text-zinc-400 flex gap-6">
                               <span><strong className="text-zinc-200">Proto:</strong> {selectedPacket.proto}</span>
                               <span><strong className="text-zinc-200">Src:</strong> {selectedPacket.src}</span>
                               <span><strong className="text-zinc-200">Dst:</strong> {selectedPacket.dst}</span>
                           </div>
                       ) : (
                           <div className="text-[11px] font-mono bg-yellow-900/20 border border-yellow-700/50 rounded px-4 py-3 text-yellow-500">
                               WARNING: No frame selected from Capture Table. Select a frame to perform Deep Analysis.
                           </div>
                       )}

                       <div className="flex-1 bg-zinc-900/50 border border-zinc-700/50 rounded-xl p-8 relative overflow-auto shadow-lg">
                          <Icon name="brain" size={180} className="absolute -top-10 -right-10 text-cyan-500/5 pointer-events-none" />
                          
                          <div className="relative z-10 h-full flex flex-col">
                            {isAnalyzing ? (
                               <div className="flex-1 flex flex-col items-center justify-center gap-4">
                                  <div className="w-8 h-8 border-2 border-cyan-500/20 border-t-cyan-500 rounded-full animate-spin" />
                                  <span className="text-[10px] font-bold uppercase tracking-widest text-cyan-400 animate-pulse">Running Neural Payload Extraction...</span>
                               </div>
                            ) : aiAnalysis ? (
                                aiAnalysis.raw ? (
                                    <div className="text-[13px] leading-relaxed whitespace-pre-wrap text-zinc-300 font-sans">{aiAnalysis.raw}</div>
                                ) : (
                                    <div className="flex flex-col gap-6 w-full animate-in">
                                        
                                        {/* Dynamic Header */}
                                        <div className="flex justify-between items-start border-b border-zinc-800 pb-4">
                                            <div>
                                                <div className="text-[10px] text-zinc-500 uppercase tracking-widest mb-1">Traffic Signature Classification</div>
                                                <div className="text-xl font-bold text-cyan-400">{aiAnalysis.traffic_type}</div>
                                            </div>
                                            <div className="text-right">
                                                <div className="text-[10px] text-zinc-500 uppercase tracking-widest mb-1">Threat Level</div>
                                                <div className={`px-4 py-1.5 rounded text-[11px] font-black uppercase tracking-widest border shadow-sm ${getRiskBadgeColor(aiAnalysis.risk_level)}`}>
                                                    {aiAnalysis.risk_level}
                                                </div>
                                            </div>
                                        </div>

                                        {/* Anomalies List */}
                                        <div className="bg-red-950/10 border border-red-900/30 rounded-lg p-5 shadow-inner">
                                            <h3 className="text-[11px] font-bold text-red-400 uppercase tracking-widest mb-3 flex items-center gap-2"><Icon name="alert" size={14}/> Detected Anomalies & Signatures</h3>
                                            <ul className="list-none space-y-2">
                                                {Array.isArray(aiAnalysis.anomalies) && aiAnalysis.anomalies.map((ano, i) => (
                                                    <li key={i} className="text-xs text-zinc-300 pl-4 relative before:content-['>'] before:absolute before:left-0 before:text-red-500 font-mono leading-relaxed">{ano}</li>
                                                ))}
                                            </ul>
                                        </div>

                                        {/* Split Grid for Payload & Recommendation */}
                                        <div className="grid grid-cols-2 gap-6 flex-1">
                                            <div className="bg-black/50 border border-zinc-800/80 rounded-lg p-5 shadow-inner">
                                                <h3 className="text-[11px] font-bold text-cyan-500 uppercase tracking-widest mb-3 flex items-center gap-2"><Icon name="terminal" size={14}/> Payload Dissection</h3>
                                                <p className="text-xs text-zinc-400 leading-relaxed font-mono">{aiAnalysis.payload_breakdown}</p>
                                            </div>
                                            <div className="bg-amber-950/10 border border-amber-900/30 rounded-lg p-5 shadow-inner">
                                                <h3 className="text-[11px] font-bold text-amber-500 uppercase tracking-widest mb-3 flex items-center gap-2"><Icon name="shield" size={14}/> Tactical Directive</h3>
                                                <p className="text-sm text-amber-100/90 leading-relaxed font-bold">{aiAnalysis.recommendation}</p>
                                            </div>
                                        </div>

                                    </div>
                                )
                            ) : (
                               <div className="flex-1 flex items-center justify-center text-[13px] text-zinc-500">
                                   Awaiting target acquisition. Select a frame and initialize Audit.
                               </div>
                            )}
                          </div>
                       </div>
                    </div>
                  )}

                  {/* SETTINGS */}
                  {view === 'settings' && (
                     <div className="p-8 max-w-xl mx-auto space-y-8 animate-in">
                        <h2 className="text-2xl font-black text-zinc-100 uppercase tracking-widest flex items-center gap-3">
                          <Icon name="settings" size={24} className="text-zinc-500" /> Vault Configuration
                        </h2>
                        <div className="bg-zinc-900/80 border border-zinc-800 rounded-xl p-8 space-y-8 shadow-lg">
                           <div className="space-y-3">
                             <label className="text-[10px] font-bold text-cyan-400 uppercase tracking-widest">Gemini API Key</label>
                             <input type="password" value={userApiKey} onChange={e => saveKey(e.target.value)} placeholder="AI Key Required for Neural Link" className="w-full bg-black border border-zinc-700 rounded-md p-3 text-xs font-mono focus:ring-1 focus:ring-cyan-500 outline-none text-zinc-200" />
                             <p className="text-[9px] text-zinc-500 mt-1">Key is stored in local browser memory only.</p>
                           </div>
                           <div className="flex justify-between items-center pt-6 border-t border-zinc-800/80">
                              <div className="space-y-1">
                                 <span className="text-xs font-bold text-zinc-200 uppercase">AI Integration Layer</span>
                                 <p className="text-[10px] text-zinc-500">Enable natural language filtering and deep payload audits.</p>
                              </div>
                              <button onClick={() => setIsAiEnabled(!isAiEnabled)}>
                                <Icon name={isAiEnabled ? "toggleOn" : "toggleOff"} size={36} className={isAiEnabled ? "text-cyan-500 drop-shadow-[0_0_8px_rgba(6,182,212,0.4)]" : "text-zinc-700"} />
                              </button>
                           </div>
                        </div>
                     </div>
                  )}
                </div>
              </main>
            </div>
          );
        };

        const SideBtn = ({ iconName, active, onClick, label }) => (
          <button onClick={onClick} className={`w-full py-3.5 flex items-center justify-center rounded-lg transition-all relative group ${active ? 'bg-cyan-600/10 text-cyan-400 shadow-sm border border-cyan-500/30' : 'text-zinc-500 hover:text-zinc-300 hover:bg-zinc-900 border border-transparent'}`}>
            <Icon name={iconName} size={18} />
            <span className="absolute left-[70px] bg-zinc-800 text-zinc-200 text-[10px] font-bold px-3 py-1.5 rounded-md opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none uppercase tracking-widest whitespace-nowrap z-50 border border-zinc-700 shadow-xl shadow-black/50">
               {label}
            </span>
          </button>
        );

        const StatBox = ({ label, val, iconName, color }) => {
          const colors = {
            blue: 'text-blue-400 border-blue-500/20 bg-blue-500/5',
            cyan: 'text-cyan-400 border-cyan-500/20 bg-cyan-500/5',
            red: 'text-red-400 border-red-500/20 bg-red-500/5',
            emerald: 'text-emerald-400 border-emerald-500/20 bg-emerald-500/5',
            zinc: 'text-zinc-400 border-zinc-700/50 bg-zinc-800/20'
          };
          const iconColors = { blue: 'text-blue-500/20', cyan: 'text-cyan-500/20', red: 'text-red-500/20', emerald: 'text-emerald-500/20', zinc: 'text-zinc-500/10' };

          return (
            <div className={`border rounded-xl p-6 relative overflow-hidden transition-all duration-300 hover:scale-[1.02] ${colors[color] || colors.zinc}`}>
              <Icon name={iconName} className={`absolute -right-2 -bottom-2 ${iconColors[color] || iconColors.zinc}`} size={70} />
              <div className="text-3xl font-black tracking-tighter mb-1 relative z-10">{val}</div>
              <div className="text-[10px] font-bold uppercase tracking-widest opacity-80 relative z-10">{label}</div>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
